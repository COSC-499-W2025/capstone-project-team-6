version: '3.9'

services:
  app:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
    container_name: capstone_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MYAPP_DB_PATH=/app/data/myapp.db
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/vector_db
      - ENVIRONMENT=production
    env_file:
      - ../.env
    volumes:
      - ../src/backend/uploads:/app/src/backend/uploads
      - ../analysis_results:/app/analysis_results
      - ../data:/app/data
    depends_on:
      database:
        condition: service_healthy
    networks:
      - capstone-network

  database:
    image: ankane/pgvector:latest
    container_name: capstone_database
    restart: unless-stopped
    environment:
      POSTGRES_DB: vector_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - capstone-network

volumes:
  postgres_data:
    driver: local

networks:
  capstone-network:
    driver: bridge
